version: 0.0
os: linux
files:
  - source: /
    destination: /opt/app
    file_exists_behavior: OVERWRITE
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: ubuntu
  ApplicationStart:
    - location: scripts/deploy.sh
      timeout: 300
      runas: ubuntu