version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies...
      - npm install -g pnpm
      - pnpm install

  pre_build:
    commands:
      - echo Running tests...
      - pnpm run test --if-present
      - echo Running linting...
      - pnpm run lint --if-present

  build:
    commands:
      - echo Building the Next.js application...
      - pnpm run build
      - echo Build completed on `date`

  post_build:
    commands:
      - echo Build phase completed

artifacts:
  files:
    - "**/*"
  exclude-paths:
    - node_modules/**/*
    - .git/**/*
    - .next/cache/**/*
